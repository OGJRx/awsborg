<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Frankenstein Chat</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: var(--tg-theme-bg-color, #0f172a);
      --bg-secondary: #1e293b;
      --text-primary: var(--tg-theme-text-color, #f8fafc);
      --text-secondary: #94a3b8;
      --accent: var(--tg-theme-button-color, #3b82f6);
      --accent-hover: #2563eb;
      --border: #334155;
      --success: #22c55e;
      --error: #ef4444;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo { font-size: 24px; }
    .title { font-weight: 600; font-size: 18px; }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--success);
    }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.4;
    }
    .message.user {
      align-self: flex-end;
      background: var(--accent);
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start;
      background: var(--bg-secondary);
      border-bottom-left-radius: 4px;
    }
    .input-container {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
    }
    .input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
    }
    .input:focus { border-color: var(--accent); }
    .send-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .model-selector {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
    }
    .model-btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 14px;
    }
    .model-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🧠</span>
    <span class="title">Frankenstein Chat</span>
    <span class="status-dot" id="statusDot"></span>
  </div>
  <div class="model-selector">
    <button class="model-btn active" data-model="gemini">🌐 Gemini</button>
    <button class="model-btn" data-model="local">🖥️ Local</button>
  </div>
  <div class="chat-container" id="chatContainer">
    <div class="message assistant">¡Hola! Soy Frankenstein. Selecciona un modelo y escribe.</div>
  </div>
  <div class="input-container">
    <input type="text" class="input" id="messageInput" placeholder="Escribe tu mensaje...">
    <button class="send-btn" id="sendBtn">➤</button>
  </div>
  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }
    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    let currentModel = 'gemini';
    let chatId = tg?.initDataUnsafe?.user?.id || Date.now();

    document.querySelectorAll('.model-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentModel = btn.dataset.model;
      });
    });

    function addMessage(content, isUser) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'assistant'}`;
      div.textContent = content;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) return;
      addMessage(message, true);
      messageInput.value = '';
      sendBtn.disabled = true;
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, model: currentModel, chat_id: chatId })
        });
        const data = await response.json();
        addMessage(data.success ? (data.data?.response || data.data || 'OK') : `Error: ${data.error}`, false);
      } catch (e) { addMessage('Error de conexión', false); }
      sendBtn.disabled = false;
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
