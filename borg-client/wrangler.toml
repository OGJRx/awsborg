# ============================================================
# BORG-CLIENT - Frontend Cliente IA Worker
# ============================================================
# Telegram Mini App + API REST
# Stack: TypeScript Strict, Cloudflare Workers, D1
# PROHIBITIONS: NO KV, NO R2
# ============================================================

name = "borg-client"
main = "src/index.ts"
compatibility_date = "2024-03-18"
workers_dev = true

# ============================================================
# D1 DATABASE
# ============================================================
[[d1_databases]]
binding = "DB"
database_name = "AWS-BORG-DATA"
database_id = "3864ce7f-9d0f-45f4-b3e6-7e4722d353c6"

# ============================================================
# SERVICE BINDINGS
# ============================================================
[[services]]
binding = "ADMIN"
service = "borg-admin"

# ============================================================
# ENVIRONMENT VARIABLES
# ============================================================
[vars]
ENVIRONMENT = "production"
