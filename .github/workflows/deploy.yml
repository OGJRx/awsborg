name: "Astillero Espacial - Deploy"
on:
  push:
    branches: [super-borg-v0.1]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint TS
        run: |
          cd augeborg-backend && npm install --silent && npm run build --if-present
          cd ../augeborg-frontend && npm install --silent && npm run build --if-present
      - name: Lint Shell
        run: shellcheck scripts/ec2/*.sh

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mask Token
        run: echo "::add-mask::${{ secrets.INTERNAL_API_TOKEN }}"
      - name: Deploy Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler deploy --config augeborg-backend/wrangler.toml
          npx wrangler deploy --config augeborg-frontend/wrangler.toml

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Ping Service
        run: |
          for i in {1..10}; do
            curl -f https://augeborg-frontend.marketceogjr.workers.dev/ || exit 1
            sleep 30
          done
