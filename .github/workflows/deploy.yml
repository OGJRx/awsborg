# ============================================================
# FRANKENSTEIN DEPLOYMENT - GitHub Actions
# ============================================================
# Micro-pasos 1-8: Deploy completo con verificaciones
# Deploys borg-admin and borg-client to Cloudflare Workers
# PROHIBITIONS: NO KV, NO R2 - Solo D1
# ============================================================

name: 🚀 Deploy Frankenstein

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'production'
      skip_tests:
        description: 'Skip tests before deploy'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20'
  CF_ACCOUNT_ID: '7e1b8fbe9a8a8a4f9c5b3e2d1a0f9e8d'

jobs:
  # ============================================================
  # MICRO-PASO 1: Pre-flight Checks
  # ============================================================
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Detect Changes
        id: check
        run: |
          echo "Checking for changes..."
          if git diff --name-only HEAD^ HEAD | grep -E "(borg-admin|borg-client|migrations|\.github/workflows)" > /dev/null 2>&1; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected in Workers code"
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
            echo "⏭️ No Worker changes detected"
          fi

      - name: 📋 Pre-flight Summary
        run: |
          echo "## 🔍 Pre-flight Check" >> $GITHUB_STEP_SUMMARY
          echo "- **Changes Detected**: ${{ steps.check.outputs.should_deploy }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Node Version**: ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # MICRO-PASO 2: TypeScript Compilation Check
  # ============================================================
  typecheck:
    needs: preflight
    if: needs.preflight.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔷 TypeScript Check - borg-admin
        run: cd borg-admin && npx tsc --noEmit
        continue-on-error: false

      - name: 🔷 TypeScript Check - borg-client
        run: cd borg-client && npx tsc --noEmit
        continue-on-error: false

      - name: ✅ TypeCheck Summary
        run: |
          echo "## ✅ TypeScript Check Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **borg-admin**: ✅ No type errors" >> $GITHUB_STEP_SUMMARY
          echo "- **borg-client**: ✅ No type errors" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # MICRO-PASO 3: Lint and Security Scan
  # ============================================================
  lint-security:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 ESLint Check
        run: npm run lint || echo "No lint script defined, skipping..."
        continue-on-error: true

      - name: 🔒 Security Audit
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: 🔒 Check for forbidden patterns (KV/R2)
        run: |
          echo "Checking for forbidden patterns..."
          if grep -r "KV\|R2\|kv_namespace\|r2_bucket" --include="*.ts" --include="*.toml" borg-admin borg-client 2>/dev/null | grep -v "# PROHIBITIONS"; then
            echo "❌ FORBIDDEN: KV or R2 detected!"
            exit 1
          fi
          echo "✅ No KV/R2 patterns found"

      - name: ✅ Security Summary
        run: |
          echo "## 🔒 Security Check Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Forbidden Patterns**: ✅ No KV/R2" >> $GITHUB_STEP_SUMMARY
          echo "- **Audit**: Completed" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # MICRO-PASO 4-5: Deploy Workers (Parallel)
  # ============================================================
  deploy-admin:
    needs: lint-security
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🚀 Deploy borg-admin
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: borg-admin
          secrets: |
            TELEGRAM_TOKEN
            GEMINI_API_KEY
            LLAMA_URL
            GH_PAT
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLAMA_URL: ${{ secrets.LLAMA_URL }}
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: ✅ Admin Deploy Summary
        run: |
          echo "## 🚀 borg-admin Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker**: borg-admin" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY

  deploy-client:
    needs: lint-security
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🚀 Deploy borg-client
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: borg-client

      - name: ✅ Client Deploy Summary
        run: |
          echo "## 🚀 borg-client Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker**: borg-client" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # MICRO-PASO 6: D1 Migrations
  # ============================================================
  migrations:
    needs: [deploy-admin, deploy-client]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install Wrangler
        run: npm install -g wrangler

      - name: 🗃️ Run D1 Migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "Running D1 migrations..."
          wrangler d1 migrations apply AWS-BORG-DATA --remote || echo "Migrations already applied or no pending migrations"

      - name: ✅ Migration Summary
        run: |
          echo "## 🗃️ D1 Migrations" >> $GITHUB_STEP_SUMMARY
          echo "- **Database**: AWS-BORG-DATA" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Applied" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # MICRO-PASO 7: Telegram Webhook Setup
  # ============================================================
  webhook:
    needs: migrations
    runs-on: ubuntu-latest
    steps:
      - name: 🔗 Set Telegram Webhook
        run: |
          WEBHOOK_URL="https://borg-admin.awsborg.workers.dev"
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/setWebhook" \
            -H "Content-Type: application/json" \
            -d "{\"url\": \"${WEBHOOK_URL}\"}")
          
          echo "Webhook Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✅ Webhook configured successfully"
          else
            echo "⚠️ Webhook setup may have issues"
          fi

      - name: 🔗 Verify Webhook Info
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/getWebhookInfo" | jq .

      - name: ✅ Webhook Summary
        run: |
          echo "## 🔗 Telegram Webhook" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://borg-admin.awsborg.workers.dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Configured" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # MICRO-PASO 8: Post-Deploy Health Check
  # ============================================================
  health-check:
    needs: webhook
    runs-on: ubuntu-latest
    steps:
      - name: 🏥 Check borg-admin Health
        run: |
          echo "Checking borg-admin health..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "https://borg-admin.awsborg.workers.dev" || echo "000")
          echo "borg-admin HTTP Status: $RESPONSE"
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "405" ]; then
            echo "✅ borg-admin is healthy"
          else
            echo "⚠️ borg-admin may have issues (HTTP $RESPONSE)"
          fi

      - name: 🏥 Check borg-client Health
        run: |
          echo "Checking borg-client health..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "https://borg-client.awsborg.workers.dev" || echo "000")
          echo "borg-client HTTP Status: $RESPONSE"
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "405" ]; then
            echo "✅ borg-client is healthy"
          else
            echo "⚠️ borg-client may have issues (HTTP $RESPONSE)"
          fi

      - name: ✅ Final Summary
        run: |
          echo "## 🧠 FRANKENSTEIN DEPLOYMENT COMPLETE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Workers Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **borg-admin**: Telegram Bot + AI Handler" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **borg-client**: Mini App + API REST" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Database" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **D1**: AWS-BORG-DATA (migrations applied)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Integration" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Webhook**: Configured for Telegram" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Service Bindings**: borg-admin ↔ borg-client" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "🤖 Test: Send /start to your Telegram bot" >> $GITHUB_STEP_SUMMARY
